<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FACILPA — Lençóis Paulista. Em breve novidades da próxima edição.">
  <title>FACILPA — Nos Vemos em 2027</title>
  <link rel="icon" href="assets/images/pfavico-0.ico">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #c9a03a;
      --gold-dim: rgba(201, 160, 58, 0.6);
      --white: #ffffff;
      --dim: rgba(255, 255, 255, 0.45);
      --faint: rgba(255, 255, 255, 0.18);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #080808;
    }

    /* ─── Background ─────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('assets/images/f6efe5_b1497f197d6a4a05a3adb4d23733bd25f000-28.jpg');
      background-size: cover;
      background-position: center 40%;
      will-change: transform, filter;
      animation: bgReveal 2.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes bgReveal {
      0%   { transform: scale(1.12); filter: brightness(0) blur(8px); }
      100% { transform: scale(1.04); filter: brightness(0.28) blur(0px) saturate(0.75); }
    }

    /* ─── Radial vignette ────────────────────────── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 80% 70% at 50% 50%, transparent 10%, rgba(0,0,0,0.65) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.7) 100%);
    }

    /* ─── Main ───────────────────────────────────── */
    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 5rem;
      text-align: center;
      gap: 0;
    }

    /* ─── Logo ───────────────────────────────────── */
    .logo {
      width: clamp(90px, 14vw, 160px);
      margin-bottom: 2.5rem;
      filter: drop-shadow(0 0 32px rgba(0,0,0,0.9));
      opacity: 0;
      transform: translateY(16px);
      animation: riseIn 1s ease 0.4s forwards;
    }

    /* ─── Rule ───────────────────────────────────── */
    .rule {
      display: block;
      width: clamp(48px, 8vw, 72px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.1s forwards;
    }

    /* ─── Eyebrow ─────────────────────────────────── */
    .eyebrow {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(0.6rem, 1.6vw, 0.75rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.3s forwards;
    }

    /* ─── Headline ────────────────────────────────── */
    .headline {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(2.2rem, 6.5vw, 6rem);
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 0.95;
      text-shadow: 0 2px 48px rgba(0,0,0,0.9);
      opacity: 0;
      filter: blur(10px);
      animation: blurIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }

    .year {
      display: block;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(5rem, 18vw, 16rem);
      font-weight: 700;
      font-style: normal;
      letter-spacing: 0.05em;
      line-height: 0.88;
      color: var(--gold);
      text-shadow:
        0 0 80px rgba(201,160,58,0.3),
        0 2px 64px rgba(0,0,0,0.95);
      opacity: 0;
      filter: blur(14px);
      animation: blurIn 1.3s cubic-bezier(0.16, 1, 0.3, 1) 1.25s forwards;
    }

    /* ─── Subtitle ────────────────────────────────── */
    .subtitle {
      margin-top: 2.4rem;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(0.65rem, 1.8vw, 0.85rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--dim);
      opacity: 0;
      animation: fadeIn 0.8s ease 2.2s forwards;
    }

    /* ─── Social ──────────────────────────────────── */
    .social {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-top: 2.8rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 2.5s forwards;
    }

    .social a {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(0.6rem, 1.4vw, 0.7rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--faint);
      text-decoration: none;
      transition: color 0.4s ease, letter-spacing 0.4s ease;
    }

    .social a:hover {
      color: var(--gold);
      letter-spacing: 0.38em;
    }

    .social-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold-dim);
    }

    /* ─── Footer ──────────────────────────────────── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 1.4rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.8rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 2.8s forwards;
    }

    .footer-rule {
      flex: 1;
      max-width: 100px;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .footer-copy {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      white-space: nowrap;
    }

    /* ─── Keyframes ──────────────────────────────── */
    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes blurIn {
      to { opacity: 1; filter: blur(0); }
    }

    /* ─── Mobile ─────────────────────────────────── */
    @media (max-width: 480px) {
      main { padding-bottom: 4rem; gap: 0; }
      .logo { margin-bottom: 2rem; }
      .rule { margin-bottom: 2rem; }
      .headline { letter-spacing: 0.07em; }
      .year { letter-spacing: 0.03em; }
      .subtitle { letter-spacing: 0.2em; }
      footer { padding: 1rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="bg" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main>
    <img
      class="logo"
      src="assets/images/f6efe5_6556f1012f90459b9bc851bf66cc6f7c_mv2-36.png"
      alt="FACILPA — Lençóis Paulista"
      width="160"
      height="160"
    >

    <span class="rule" aria-hidden="true"></span>

    <p class="eyebrow">Lençóis Paulista</p>

    <h1 class="headline">
      Nos vemos em
      <span class="year">2027</span>
    </h1>

    <p class="subtitle">Em breve, novidades da próxima edição.</p>

    <nav class="social" aria-label="Redes sociais">
      <a href="https://www.instagram.com/facilpa" target="_blank" rel="noopener noreferrer">Instagram</a>
      <span class="social-dot" aria-hidden="true"></span>
      <a href="https://www.facebook.com/facilpa" target="_blank" rel="noopener noreferrer">Facebook</a>
    </nav>
  </main>

  <footer>
    <div class="footer-rule" aria-hidden="true"></div>
    <span class="footer-copy">FACILPA &copy; Todos os direitos reservados</span>
    <div class="footer-rule" aria-hidden="true"></div>
  </footer>

</body>
</html>
